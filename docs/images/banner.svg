<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#94a3b8">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="150" cy="50" r="1.5"/>
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="250" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/>
    <circle cx="100" cy="150" r="1.5"/>
    <circle cx="150" cy="150" r="1.5"/>
    <circle cx="200" cy="150" r="1.5"/>
    <circle cx="250" cy="150" r="1.5"/>
    <circle cx="950" cy="150" r="1.5"/>
    <circle cx="1000" cy="150" r="1.5"/>
    <circle cx="1050" cy="150" r="1.5"/>
    <circle cx="1100" cy="150" r="1.5"/>
    <circle cx="1150" cy="150" r="1.5"/>
    <circle cx="950" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/>
    <circle cx="1050" cy="200" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="1150" cy="200" r="1.5"/>
    <circle cx="950" cy="250" r="1.5"/>
    <circle cx="1000" cy="250" r="1.5"/>
    <circle cx="1050" cy="250" r="1.5"/>
    <circle cx="1100" cy="250" r="1.5"/>
    <circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Pipeline flow visualization -->
  <g transform="translate(600, 205)" opacity="0.6">
    <!-- Pipeline boxes -->
    <g font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">
      <!-- Stage 1 -->
      <rect x="-420" y="-15" width="80" height="30" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
      <text x="-380" y="5">Router</text>

      <!-- Arrow -->
      <line x1="-335" y1="0" x2="-310" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="-310,0 -316,-4 -316,4" fill="#475569"/>

      <!-- Stage 2 -->
      <rect x="-305" y="-15" width="100" height="30" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
      <text x="-255" y="5">Researcher</text>

      <!-- Arrow -->
      <line x1="-200" y1="0" x2="-175" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="-175,0 -181,-4 -181,4" fill="#475569"/>

      <!-- Stage 3 -->
      <rect x="-170" y="-15" width="85" height="30" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
      <text x="-127" y="5">Outliner</text>

      <!-- Arrow -->
      <line x1="-80" y1="0" x2="-55" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="-55,0 -61,-4 -61,4" fill="#475569"/>

      <!-- Gate 1 -->
      <rect x="-50" y="-15" width="70" height="30" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="-15" y="5" fill="#60a5fa">Gate 1</text>

      <!-- Arrow -->
      <line x1="25" y1="0" x2="50" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="50,0 44,-4 44,4" fill="#475569"/>

      <!-- Stage 4 -->
      <rect x="55" y="-15" width="95" height="30" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
      <text x="102" y="5">Generator</text>

      <!-- Arrow -->
      <line x1="155" y1="0" x2="180" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="180,0 174,-4 174,4" fill="#475569"/>

      <!-- Stage 5 -->
      <rect x="185" y="-15" width="85" height="30" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
      <text x="227" y="5">Validator</text>

      <!-- Arrow -->
      <line x1="275" y1="0" x2="300" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="300,0 294,-4 294,4" fill="#475569"/>

      <!-- Gate 2 -->
      <rect x="305" y="-15" width="70" height="30" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="340" y="5" fill="#a78bfa">Gate 2</text>

      <!-- Arrow -->
      <line x1="380" y1="0" x2="405" y2="0" stroke="#475569" stroke-width="1.5"/>
      <polygon points="405,0 399,-4 399,4" fill="#475569"/>

      <!-- Stage 6 -->
      <rect x="410" y="-15" width="85" height="30" rx="6" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
      <text x="452" y="5" fill="#6ee7b7">Publish</text>
    </g>
  </g>

  <!-- Main title -->
  <text x="600" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">
    Blog AI Agent
  </text>

  <!-- Subtitle -->
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
    주제 한 줄이면 끝 — 자료조사부터 본문 작성, 다이어그램, SEO 최적화까지 자동화
  </text>

  <!-- Tech badges -->
  <g transform="translate(600, 170)" text-anchor="middle">
    <g transform="translate(-180, 0)">
      <rect x="-45" y="-10" width="90" height="20" rx="10" fill="#1e40af" fill-opacity="0.3" stroke="#3b82f6" stroke-width="0.5"/>
      <text font-family="monospace" font-size="11" fill="#60a5fa" y="4">React 19</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-45" y="-10" width="90" height="20" rx="10" fill="#065f46" fill-opacity="0.3" stroke="#10b981" stroke-width="0.5"/>
      <text font-family="monospace" font-size="11" fill="#6ee7b7" y="4">FastAPI</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-55" y="-10" width="110" height="20" rx="10" fill="#7c2d12" fill-opacity="0.3" stroke="#f97316" stroke-width="0.5"/>
      <text font-family="monospace" font-size="11" fill="#fb923c" y="4">Claude Code</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-40" y="-10" width="80" height="20" rx="10" fill="#4c1d95" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="0.5"/>
      <text font-family="monospace" font-size="11" fill="#a78bfa" y="4">$0/post</text>
    </g>
  </g>
</svg>
