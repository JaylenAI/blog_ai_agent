id: concept
name: 개념 해설형
name_en: Concept Explainer
description: 새로운 기술이나 개념을 깊이 있게 소개하는 형식
icon: "\U0001F4A1"

structure:
  intro_style: "독자의 pain point 공감 → 이 개념이 왜 중요한지 설득 → 글에서 다룰 범위 선언"
  closing_style: "핵심 요약 테이블 → 실무 적용 권유 → 미래 전망 한 문장"
  required_sections:
    - "들어가며"
    - "핵심 개념 정의"
    - "주요 구성요소"
    - "특징 및 장단점"
    - "활용 사례"
    - "한눈에 비교"
    - "마치며"
  optional_sections:
    - "설치 및 시작하기"
    - "관련 기술 비교"
  section_count:
    min: 7
    max: 9
  char_count:
    standard: [6000, 8000]
    long: [10000, 13000]

elements:
  tables_min: 2
  code_blocks: [1, 4]
  diagram_types: ["architecture", "lifecycle", "comparison"]
  expected_images: [2, 4]
  use_metaphors: true
  use_callout_boxes: true

validation:
  intro_keywords: ["들어가며"]
  closing_keywords: ["마치며"]
  forbidden_sections: ["FAQ", "참고 자료", "References"]

seo:
  title_max_chars: 60
  tags_count: 10
  title_patterns:
    - "{concept}이란? 핵심 개념부터 활용까지"
    - "{concept} 완벽 정리: 개념·특징·활용 사례"

prompt_instructions: |
  이 글은 **개념 해설형** 블로그입니다.
  새로운 기술/개념을 처음 접하는 독자도 이해할 수 있도록 체계적으로 설명합니다.

  작성 핵심:
  - 각 대섹션 시작에 "~란 ~하는 ~입니다" 형태의 명확한 정의문을 배치하세요.
  - 추상 개념은 반드시 일상 비유(메타포)로 풀어서 설명하세요.
  - 기존 방식과의 차이를 명확히 대비(Before/After)하세요.
  - "이 개념이 왜 중요한가"를 들어가며에서 설득력 있게 제시하세요.
  - 마지막 섹션 직전에 "한눈에 비교" 요약 테이블(HTML <table>)을 배치하세요.
  - 코드 예시보다 개념 이해에 초점을 맞추세요. 코드는 보조적으로만 사용합니다.
  - Mermaid 다이어그램으로 아키텍처나 동작 흐름을 시각화하세요.

router_signals:
  - "이란"
  - "란?"
  - "개념"
  - "정의"
  - "소개"
  - "가이드"
  - "완벽 정리"
  - "입문"
  - "기초"
  - "알아보"
